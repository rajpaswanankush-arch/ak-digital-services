<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AK Digital Services — Shop Manager</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@500;600;700;800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f6f4ef;
  --surface:#ffffff;
  --sidebar:#0f2438;
  --sidebar-hover:#1c3d59;
  --sidebar-text:#b9c8d6;
  --accent:#d98e2b;
  --accent-dark:#b8721c;
  --accent-light:#fbe8cc;
  --text:#1c2530;
  --text-muted:#6b7480;
  --border:#e5e0d3;
  --success:#1e8a5f;
  --success-light:#e2f4ec;
  --danger:#c1443b;
  --danger-light:#fbe7e5;
  --warning:#d98e2b;
  --warning-light:#fbe8cc;
  --radius:10px;
  --shadow:0 1px 2px rgba(15,36,56,0.06), 0 4px 16px rgba(15,36,56,0.04);
}
*{box-sizing:border-box; margin:0; padding:0;}
body{
  font-family:'Inter',sans-serif;
  background:var(--bg);
  color:var(--text);
  overflow:hidden;
  font-size:14px;
}
.mono{font-family:'JetBrains Mono',monospace;}
.app{display:flex; height:100vh; width:100vw;}

/* ---------- Sidebar ---------- */
.sidebar{
  width:236px; min-width:236px; background:var(--sidebar); color:var(--sidebar-text);
  display:flex; flex-direction:column; height:100%;
}
.brand{
  display:flex; align-items:center; gap:10px; padding:20px 18px 16px 18px;
  border-bottom:1px solid rgba(255,255,255,0.08);
}
.brand-badge{
  width:40px; height:40px; border-radius:50%; background:linear-gradient(135deg,var(--accent),var(--accent-dark));
  display:flex; align-items:center; justify-content:center; font-family:'Sora',sans-serif; font-weight:800;
  color:#1c1305; font-size:15px; letter-spacing:-0.5px; flex-shrink:0;
  box-shadow:0 0 0 3px rgba(217,142,43,0.18);
}
.brand-text .name{font-family:'Sora',sans-serif; font-weight:700; font-size:14.5px; color:#fff; line-height:1.25;}
.brand-text .sub{font-size:10.5px; color:var(--sidebar-text); letter-spacing:0.06em; text-transform:uppercase;}
.nav{flex:1; overflow-y:auto; padding:10px 10px;}
.nav-item{
  display:flex; align-items:center; gap:11px; padding:9px 12px; border-radius:8px; cursor:pointer;
  color:var(--sidebar-text); font-size:13.5px; font-weight:500; margin-bottom:2px; transition:background .12s, color .12s;
  user-select:none;
}
.nav-item .ic{width:18px; text-align:center; font-size:15px;}
.nav-item:hover{background:var(--sidebar-hover); color:#fff;}
.nav-item.active{background:var(--accent); color:#1c1305; font-weight:600;}
.nav-section-label{font-size:10px; text-transform:uppercase; letter-spacing:0.08em; color:#5c7286; padding:14px 12px 6px 12px; font-weight:600;}
.sidebar-footer{padding:12px; border-top:1px solid rgba(255,255,255,0.08);}
.logout-btn{
  width:100%; padding:9px; border-radius:8px; background:rgba(255,255,255,0.06); color:var(--sidebar-text);
  border:1px solid rgba(255,255,255,0.1); cursor:pointer; font-size:13px; font-weight:500; font-family:inherit;
}
.logout-btn:hover{background:rgba(255,255,255,0.12); color:#fff;}

/* ---------- Main ---------- */
.main{flex:1; display:flex; flex-direction:column; height:100%; min-width:0;}
.topbar{
  height:60px; background:var(--surface); border-bottom:1px solid var(--border);
  display:flex; align-items:center; justify-content:space-between; padding:0 24px; flex-shrink:0;
}
.topbar-title{font-family:'Sora',sans-serif; font-weight:700; font-size:19px; color:var(--text);}
.topbar-right{display:flex; align-items:center; gap:16px;}
.topbar-date{font-size:12.5px; color:var(--text-muted); font-family:'JetBrains Mono',monospace;}
.content{flex:1; overflow-y:auto; padding:24px;}

/* ---------- Cards / stats ---------- */
.stat-grid{display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:14px; margin-bottom:20px;}
.stat-card{
  background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:16px 18px;
  box-shadow:var(--shadow); position:relative; overflow:hidden;
}
.stat-card .label{font-size:11.5px; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.05em; font-weight:600;}
.stat-card .value{font-family:'JetBrains Mono',monospace; font-size:24px; font-weight:700; margin-top:6px; color:var(--text);}
.stat-card .delta{font-size:11.5px; margin-top:4px; color:var(--text-muted);}
.stat-card.accent{border-left:4px solid var(--accent);}
.stat-card.success{border-left:4px solid var(--success);}
.stat-card.danger{border-left:4px solid var(--danger);}
.stat-card.neutral{border-left:4px solid #6b7480;}

.card{
  background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:18px 20px;
  box-shadow:var(--shadow); margin-bottom:18px;
}
.card-title{font-family:'Sora',sans-serif; font-weight:700; font-size:15px; margin-bottom:14px; display:flex; align-items:center; justify-content:space-between;}
.two-col{display:grid; grid-template-columns:1.3fr 1fr; gap:16px;}
@media(max-width:1100px){.two-col{grid-template-columns:1fr;}}

/* ---------- Buttons ---------- */
.btn{
  font-family:'Inter',sans-serif; font-weight:600; font-size:13px; padding:8px 15px; border-radius:8px;
  border:1px solid transparent; cursor:pointer; display:inline-flex; align-items:center; gap:6px; transition:.12s;
}
.btn-primary{background:var(--accent); color:#1c1305;}
.btn-primary:hover{background:var(--accent-dark); color:#fff;}
.btn-outline{background:transparent; border:1px solid var(--border); color:var(--text);}
.btn-outline:hover{background:var(--bg);}
.btn-danger{background:var(--danger-light); color:var(--danger);}
.btn-danger:hover{background:var(--danger); color:#fff;}
.btn-sm{padding:5px 10px; font-size:12px; border-radius:6px;}
.btn:disabled{opacity:.5; cursor:not-allowed;}

/* ---------- Toolbar ---------- */
.toolbar{display:flex; align-items:center; gap:10px; margin-bottom:14px; flex-wrap:wrap;}
.toolbar .spacer{flex:1;}
input,select,textarea{
  font-family:'Inter',sans-serif; font-size:13px; padding:8px 11px; border-radius:8px; border:1px solid var(--border);
  background:#fff; color:var(--text); outline:none;
}
input:focus,select:focus,textarea:focus{border-color:var(--accent);}
.search-box{min-width:220px;}

/* ---------- Table ---------- */
table{width:100%; border-collapse:collapse; font-size:13px;}
thead th{
  text-align:left; font-size:11px; text-transform:uppercase; letter-spacing:0.04em; color:var(--text-muted);
  padding:9px 12px; border-bottom:2px solid var(--border); font-weight:700; white-space:nowrap;
}
tbody td{padding:10px 12px; border-bottom:1px solid var(--border); vertical-align:middle;}
tbody tr:hover{background:#faf8f3;}
.table-wrap{overflow-x:auto;}
.tag{display:inline-block; padding:3px 9px; border-radius:20px; font-size:11px; font-weight:600;}
.tag.success{background:var(--success-light); color:var(--success);}
.tag.danger{background:var(--danger-light); color:var(--danger);}
.tag.warning{background:var(--warning-light); color:var(--accent-dark);}
.tag.neutral{background:#eceae3; color:var(--text-muted);}
.row-actions{display:flex; gap:6px;}
.icon-btn{
  width:28px; height:28px; border-radius:6px; border:1px solid var(--border); background:#fff; cursor:pointer;
  display:flex; align-items:center; justify-content:center; font-size:13px;
}
.icon-btn:hover{background:var(--bg);}
.empty-state{text-align:center; padding:50px 20px; color:var(--text-muted);}
.empty-state .em-ic{font-size:32px; margin-bottom:10px;}
.total-row td{font-weight:700; border-top:2px solid var(--border); background:#faf8f3;}

/* ---------- Modal ---------- */
.modal-overlay{
  position:fixed; inset:0; background:rgba(15,36,56,0.45); display:none; align-items:center; justify-content:center;
  z-index:100; padding:20px;
}
.modal-overlay.open{display:flex;}
.modal{
  background:#fff; border-radius:14px; width:520px; max-width:100%; max-height:88vh; overflow-y:auto;
  box-shadow:0 20px 60px rgba(0,0,0,0.25);
}
.modal-head{padding:18px 22px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between;}
.modal-head h3{font-family:'Sora',sans-serif; font-size:16px;}
.modal-close{cursor:pointer; font-size:18px; color:var(--text-muted); border:none; background:none;}
.modal-body{padding:20px 22px;}
.modal-foot{padding:16px 22px; border-top:1px solid var(--border); display:flex; justify-content:flex-end; gap:10px;}
.form-grid{display:grid; grid-template-columns:1fr 1fr; gap:12px;}
.form-grid.single{grid-template-columns:1fr;}
.field{display:flex; flex-direction:column; gap:5px;}
.field.full{grid-column:1/-1;}
.field label{font-size:12px; font-weight:600; color:var(--text-muted);}
.field input,.field select,.field textarea{width:100%;}

/* ---------- Lock screen ---------- */
.lock-screen{
  position:fixed; inset:0; background:var(--sidebar); display:flex; align-items:center; justify-content:center; z-index:200;
}
.lock-card{background:#fff; border-radius:16px; padding:36px 34px; width:340px; text-align:center; box-shadow:0 20px 60px rgba(0,0,0,0.3);}
.lock-card .brand-badge{margin:0 auto 14px auto;}
.lock-card h2{font-family:'Sora',sans-serif; margin-bottom:4px;}
.lock-card p{color:var(--text-muted); font-size:12.5px; margin-bottom:18px;}
.lock-card input{width:100%; text-align:center; font-size:20px; letter-spacing:6px; padding:12px; margin-bottom:12px; font-family:'JetBrains Mono',monospace;}
.lock-error{color:var(--danger); font-size:12px; margin-bottom:10px; min-height:14px;}

/* ---------- Toast ---------- */
.toast{
  position:fixed; bottom:22px; right:22px; background:var(--text); color:#fff; padding:12px 18px; border-radius:9px;
  font-size:13px; font-weight:500; box-shadow:0 8px 24px rgba(0,0,0,0.25); z-index:300; opacity:0; transform:translateY(10px);
  transition:.2s; display:flex; align-items:center; gap:8px;
}
.toast.show{opacity:1; transform:translateY(0);}
.toast.success{background:var(--success);}
.toast.danger{background:var(--danger);}

/* ---------- Misc ---------- */
.section-title{font-family:'Sora',sans-serif; font-weight:800; font-size:22px; margin-bottom:2px;}
.section-desc{color:var(--text-muted); font-size:13px; margin-bottom:18px;}
.badge-count{background:var(--accent); color:#1c1305; font-size:10.5px; padding:1px 7px; border-radius:20px; font-weight:700; margin-left:auto;}
.low-stock-item{display:flex; justify-content:space-between; align-items:center; padding:9px 0; border-bottom:1px solid var(--border); font-size:13px;}
.low-stock-item:last-child{border-bottom:none;}
.progress-track{width:100%; height:8px; background:#eceae3; border-radius:6px; overflow:hidden; margin-top:6px;}
.progress-fill{height:100%; background:var(--accent); border-radius:6px;}
::-webkit-scrollbar{width:9px; height:9px;}
::-webkit-scrollbar-thumb{background:#d8d3c4; border-radius:6px;}
::-webkit-scrollbar-track{background:transparent;}
.hint{font-size:11.5px; color:var(--text-muted); margin-top:8px;}
.receipt-no{font-family:'JetBrains Mono',monospace; color:var(--text-muted); font-size:12px;}
.kv-list div{display:flex; justify-content:space-between; padding:7px 0; border-bottom:1px dashed var(--border); font-size:13px;}
.kv-list div:last-child{border-bottom:none;}
</style>
</head>
<body>

<div id="lockScreen" class="lock-screen" style="display:none;">
  <div class="lock-card">
    <div class="brand-badge">AK</div>
    <h2>AK Digital Services</h2>
    <p>Enter your PIN to unlock</p>
    <input type="password" id="lockPinInput" maxlength="8" inputmode="numeric" placeholder="••••">
    <div class="lock-error" id="lockError"></div>
    <button class="btn btn-primary" style="width:100%; justify-content:center;" onclick="tryUnlock()">Unlock</button>
  </div>
</div>

<div class="app" id="appRoot">
  <div class="sidebar">
    <div class="brand">
      <div class="brand-badge">AK</div>
      <div class="brand-text">
        <div class="name">AK Digital Services</div>
        <div class="sub">Shop Manager</div>
      </div>
    </div>
    <div class="nav" id="navList"></div>
    <div class="sidebar-footer">
      <button class="logout-btn" onclick="logout()">⏻ &nbsp;Lock / Logout</button>
    </div>
  </div>

  <div class="main">
    <div class="topbar">
      <div class="topbar-title" id="pageTitle">Dashboard</div>
      <div class="topbar-right">
        <span class="topbar-date mono" id="topDate"></span>
      </div>
    </div>
    <div class="content" id="content"></div>
  </div>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-head">
      <h3 id="modalTitle">Add Record</h3>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-foot">
      <button class="btn btn-outline" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" id="modalSaveBtn">Save</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script>
/* =========================================================
   AK DIGITAL SERVICES — SHOP MANAGER
   Single-file offline desktop app. Data stored locally via IndexedDB.
   ========================================================= */

/* ---------------- DB LAYER ---------------- */
const DB_NAME = "akDigitalServicesDB";
const DB_VERSION = 1;
const STORES = ["customers","transactions","aeps","irctc","pan","certificates",
                 "printing","photocopy","inventory","expenses","employees","settings"];
let db;

function openDB(){
  return new Promise((resolve,reject)=>{
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = (e)=>{
      const _db = e.target.result;
      STORES.forEach(store=>{
        if(!_db.objectStoreNames.contains(store)){
          _db.createObjectStore(store, {keyPath:"id", autoIncrement:true});
        }
      });
    };
    req.onsuccess = (e)=>{ db = e.target.result; resolve(db); };
    req.onerror = (e)=> reject(e);
  });
}
function tx(store, mode){ return db.transaction(store, mode).objectStore(store); }
function dbGetAll(store){
  return new Promise((resolve,reject)=>{
    const r = tx(store,"readonly").getAll();
    r.onsuccess=()=>resolve(r.result); r.onerror=(e)=>reject(e);
  });
}
function dbGet(store,id){
  return new Promise((resolve,reject)=>{
    const r = tx(store,"readonly").get(id);
    r.onsuccess=()=>resolve(r.result); r.onerror=(e)=>reject(e);
  });
}
function dbAdd(store,obj){
  return new Promise((resolve,reject)=>{
    const r = tx(store,"readwrite").add(obj);
    r.onsuccess=()=>resolve(r.result); r.onerror=(e)=>reject(e);
  });
}
function dbPut(store,obj){
  return new Promise((resolve,reject)=>{
    const r = tx(store,"readwrite").put(obj);
    r.onsuccess=()=>resolve(r.result); r.onerror=(e)=>reject(e);
  });
}
function dbDelete(store,id){
  return new Promise((resolve,reject)=>{
    const r = tx(store,"readwrite").delete(id);
    r.onsuccess=()=>resolve(); r.onerror=(e)=>reject(e);
  });
}
function dbClear(store){
  return new Promise((resolve,reject)=>{
    const r = tx(store,"readwrite").clear();
    r.onsuccess=()=>resolve(); r.onerror=(e)=>reject(e);
  });
}

/* ---------------- APP STATE ---------------- */
let SETTINGS = { id:1, shopName:"AK Digital Services", ownerName:"", address:"", phone:"",
                  email:"", gstNo:"", currency:"₹", lowStockDefault:5, pin:"" };
let currentPage = "dashboard";
let cache = {}; // in-memory cache per store, refreshed on load

const NAV = [
  {sec:"Overview"},
  {key:"dashboard", label:"Dashboard", icon:"🏠"},
  {sec:"Records"},
  {key:"customers", label:"Customers", icon:"👥"},
  {key:"transactions", label:"Transactions", icon:"💳"},
  {sec:"Services"},
  {key:"aeps", label:"AEPS", icon:"🏦"},
  {key:"irctc", label:"IRCTC", icon:"🚆"},
  {key:"pan", label:"PAN Services", icon:"🪪"},
  {key:"certificates", label:"Certificates", icon:"📜"},
  {key:"printing", label:"Printing", icon:"🖨️"},
  {key:"photocopy", label:"Photocopy", icon:"📄"},
  {sec:"Business"},
  {key:"inventory", label:"Inventory", icon:"📦"},
  {key:"expenses", label:"Expenses", icon:"🧾"},
  {key:"reports", label:"Reports", icon:"📊"},
  {key:"employee", label:"Employee", icon:"🧑‍💼"},
  {sec:"System"},
  {key:"settings", label:"Settings", icon:"⚙️"},
  {key:"backup", label:"Backup", icon:"💾"},
];

/* ---------------- MODULE CONFIGS (generic CRUD) ---------------- */
const MODULES = {
  transactions:{
    store:"transactions", title:"Transactions", singular:"Transaction",
    desc:"Mobile recharge, DTH, bill payments, money transfer & other daily services.",
    amountField:"amount", dateField:"date",
    fields:[
      {key:"date", label:"Date", type:"date", required:true, default:()=>today()},
      {key:"customerName", label:"Customer Name", type:"text", required:true},
      {key:"serviceType", label:"Service Type", type:"select", required:true,
        options:["Mobile Recharge","DTH Recharge","Bill Payment","Money Transfer","Banking","Other"]},
      {key:"description", label:"Description / Ref No.", type:"text"},
      {key:"amount", label:"Amount", type:"number", required:true},
      {key:"commission", label:"Commission Earned", type:"number", default:()=>0},
      {key:"paymentMode", label:"Payment Mode", type:"select", options:["Cash","UPI","Card","Bank Transfer"], default:()=>"Cash"},
      {key:"status", label:"Status", type:"select", options:["Completed","Pending","Failed"], default:()=>"Completed"},
    ],
    columns:["date","customerName","serviceType","amount","commission","paymentMode","status"],
  },
  aeps:{
    store:"aeps", title:"AEPS", singular:"AEPS Transaction",
    desc:"Aadhaar Enabled Payment System — cash withdrawal, balance enquiry & mini statements.",
    amountField:"amount", dateField:"date",
    fields:[
      {key:"date", label:"Date", type:"date", required:true, default:()=>today()},
      {key:"customerName", label:"Customer Name", type:"text", required:true},
      {key:"aadhaarLast4", label:"Aadhaar (last 4 digits)", type:"text"},
      {key:"bankName", label:"Bank Name", type:"text"},
      {key:"txnType", label:"Transaction Type", type:"select", required:true,
        options:["Cash Withdrawal","Balance Enquiry","Mini Statement","Aadhaar Pay","Fund Transfer"]},
      {key:"amount", label:"Amount", type:"number", required:true},
      {key:"commission", label:"Commission Earned", type:"number", default:()=>0},
      {key:"status", label:"Status", type:"select", options:["Success","Pending","Failed"], default:()=>"Success"},
    ],
    columns:["date","customerName","txnType","bankName","amount","commission","status"],
  },
  irctc:{
    store:"irctc", title:"IRCTC", singular:"Railway Booking",
    desc:"Train ticket bookings and cancellations for customers.",
    amountField:"amount", dateField:"date",
    fields:[
      {key:"date", label:"Date", type:"date", required:true, default:()=>today()},
      {key:"customerName", label:"Customer Name", type:"text", required:true},
      {key:"pnr", label:"PNR Number", type:"text"},
      {key:"trainDetails", label:"Train / Route Details", type:"text"},
      {key:"passengers", label:"No. of Passengers", type:"number", default:()=>1},
      {key:"amount", label:"Ticket Amount", type:"number", required:true},
      {key:"commission", label:"Service Charge", type:"number", default:()=>0},
      {key:"status", label:"Status", type:"select", options:["Confirmed","Waiting","Cancelled"], default:()=>"Confirmed"},
    ],
    columns:["date","customerName","pnr","trainDetails","amount","commission","status"],
  },
  pan:{
    store:"pan", title:"PAN Services", singular:"PAN Application",
    desc:"New PAN card applications and correction requests.",
    amountField:"amount", dateField:"date",
    fields:[
      {key:"date", label:"Date", type:"date", required:true, default:()=>today()},
      {key:"customerName", label:"Customer Name", type:"text", required:true},
      {key:"appType", label:"Application Type", type:"select", options:["New PAN","Correction","Reprint"], default:()=>"New PAN"},
      {key:"acknowledgementNo", label:"Acknowledgement No.", type:"text"},
      {key:"amount", label:"Amount Charged", type:"number", required:true},
      {key:"status", label:"Status", type:"select", options:["Submitted","Processing","Dispatched","Rejected"], default:()=>"Submitted"},
    ],
    columns:["date","customerName","appType","acknowledgementNo","amount","status"],
  },
  certificates:{
    store:"certificates", title:"Certificates", singular:"Certificate Application",
    desc:"Income, caste, residence, birth & other government certificate applications.",
    amountField:"amount", dateField:"date",
    fields:[
      {key:"date", label:"Date", type:"date", required:true, default:()=>today()},
      {key:"customerName", label:"Customer Name", type:"text", required:true},
      {key:"certType", label:"Certificate Type", type:"select",
        options:["Income Certificate","Caste Certificate","Residence Certificate","Birth Certificate","Death Certificate","Other"]},
      {key:"applicationNo", label:"Application No.", type:"text"},
      {key:"amount", label:"Amount Charged", type:"number", required:true},
      {key:"status", label:"Status", type:"select", options:["Submitted","Processing","Issued","Rejected"], default:()=>"Submitted"},
    ],
    columns:["date","customerName","certType","applicationNo","amount","status"],
  },
  printing:{
    store:"printing", title:"Printing", singular:"Print Job",
    desc:"Black & white and colour printing jobs.",
    amountField:"amount", dateField:"date",
    fields:[
      {key:"date", label:"Date", type:"date", required:true, default:()=>today()},
      {key:"customerName", label:"Customer Name", type:"text"},
      {key:"colorType", label:"Type", type:"select", options:["Black & White","Color"], default:()=>"Black & White"},
      {key:"pages", label:"No. of Pages", type:"number", required:true},
      {key:"ratePerPage", label:"Rate / Page", type:"number", required:true},
      {key:"amount", label:"Total Amount", type:"number", required:true, computed:(f)=> (Number(f.pages||0)*Number(f.ratePerPage||0)).toFixed(2)},
    ],
    columns:["date","customerName","colorType","pages","ratePerPage","amount"],
  },
  photocopy:{
    store:"photocopy", title:"Photocopy", singular:"Photocopy Job",
    desc:"Photocopy / Xerox jobs for walk-in customers.",
    amountField:"amount", dateField:"date",
    fields:[
      {key:"date", label:"Date", type:"date", required:true, default:()=>today()},

/* ---------------- HELPERS ---------------- */
function today(){ return new Date().toISOString().slice(0,10); }
function fmtMoney(n){ return SETTINGS.currency + Number(n||0).toLocaleString('en-IN',{minimumFractionDigits:2,maximumFractionDigits:2}); }
function fmtDate(d){ if(!d) return "—"; const dt = new Date(d); if(isNaN(dt)) return d; return dt.toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'}); }
function escapeHtml(s){ return String(s==null?"":s).replace(/[&<>"']/g, m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m])); }
function showToast(msg, type){
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = "toast show" + (type? " "+type : "");
  setTimeout(()=> t.classList.remove('show'), 2400);
}
function statusTagClass(status){
  const s = (status||"").toLowerCase();
  if(["completed","success","confirmed","issued","dispatched","active"].includes(s)) return "success";
  if(["pending","processing","waiting","submitted"].includes(s)) return "warning";
  if(["failed","rejected","cancelled","inactive"].includes(s)) return "danger";
  return "neutral";
}
async function refreshCache(store){ cache[store] = await dbGetAll(store); return cache[store]; }
async function ensureCache(store){ if(!cache[store]) await refreshCache(store); return cache[store]; }

/* ---------------- NAV / ROUTING ---------------- */
function renderNav(){
  const nav = document.getElementById('navList');
  nav.innerHTML = NAV.map(item=>{

    return `<div class="nav-item ${item.key===currentPage?'active':''}" onclick="goTo('${item.key}')">
              <span class="ic">${item.icon}</span><span>${item.label}</span>
            </div>`;

}
function goTo(page){
  currentPage = page;
  renderNav();
  document.getElementById('pageTitle').textContent = NAV.find(n=>n.key===page)?.label || "AK Digital Services";
  renderPage(page);
}

async function renderPage(page){
  const content = document.getElementById('content');
  content.innerHTML = `<div class="empty-state">Loading…</div>`;
  if(page === "dashboard") return renderDashboard();
  if(page === "customers") return renderCustomers();
  if(page === "inventory") return renderInventory();
  if(page === "employee") return renderEmployees();
  if(page === "reports") return renderReports();
  if(page === "settings") return renderSettings();

  if(MODULES[page]) return renderModulePage(page);

}

/* ---------------- DASHBOARD ---------------- */
async function renderDashboard(){
  const content = document.getElementById('content');
  const revenueStores = ["transactions","aeps","irctc","pan","certificates","printing","photocopy"];
  for(const s of revenueStores) await ensureCache(s);
  await ensureCache("expenses");
  await ensureCache("inventory");
  await ensureCache("customers");

  const t = today();
  const monthPrefix = t.slice(0,7);

  let todayRevenue=0, monthRevenue=0, todayCount=0, monthExpense=0, todayExpense=0;
  let categoryTotals = {};
  revenueStores.forEach(s=>{
    (cache[s]||[]).forEach(rec=>{
      const amt = Number(rec.amount||0);
      const d = rec.date || "";
      if(d === t){ todayRevenue += amt; todayCount++; }
      if(d.slice(0,7) === monthPrefix) monthRevenue += amt;
      categoryTotals[MODULES[s].title] = (categoryTotals[MODULES[s].title]||0) + amt;
    });
  });
  (cache.expenses||[]).forEach(e=>{
    const amt = Number(e.amount||0);
    if(e.date===t) todayExpense += amt;
    if((e.date||"").slice(0,7)===monthPrefix) monthExpense += amt;
  });

  const lowStock = (cache.inventory||[]).filter(i => Number(i.quantity) <= Number(i.lowStockAlert ?? SETTINGS.lowStockDefault));

  // recent activity: merge last records from all revenue stores
  let recent = [];
  revenueStores.forEach(s=>{
    (cache[s]||[]).forEach(r=> recent.push({...r, _module:MODULES[s].title, _store:s}));
  });
  recent.sort((a,b)=> (b.date||"").localeCompare(a.date||"") || (b.id-a.id));
  recent = recent.slice(0,8);

  content.innerHTML = `
    <div class="section-title">Welcome back 👋</div>
    <div class="section-desc">Here's how ${escapeHtml(SETTINGS.shopName)} is doing today, ${fmtDate(t)}.</div>

    <div class="stat-grid">
      <div class="stat-card accent">
        <div class="label">Today's Revenue</div>
        <div class="value">${fmtMoney(todayRevenue)}</div>
        <div class="delta">${todayCount} transaction${todayCount===1?"":"s"} today</div>
      </div>
      <div class="stat-card success">
        <div class="label">This Month Revenue</div>
        <div class="value">${fmtMoney(monthRevenue)}</div>
        <div class="delta">${monthPrefix}</div>
      </div>
      <div class="stat-card danger">
        <div class="label">Today's Expenses</div>
        <div class="value">${fmtMoney(todayExpense)}</div>
        <div class="delta">Month total: ${fmtMoney(monthExpense)}</div>
      </div>
      <div class="stat-card neutral">
        <div class="label">Net (Month)</div>
        <div class="value">${fmtMoney(monthRevenue-monthExpense)}</div>
        <div class="delta">Revenue − Expenses</div>
      </div>
    </div>

    <div class="two-col">
      <div class="card">
        <div class="card-title">Revenue by Service</div>
        <canvas id="revChart" height="200"></canvas>
      </div>
      <div class="card">
        <div class="card-title">Low Stock Alerts <span class="badge-count">${lowStock.length}</span></div>
        ${lowStock.length===0 ? `<div class="empty-state" style="padding:20px;"><div class="em-ic">✅</div>All items are well stocked.</div>` :
          lowStock.map(i=>`
            <div class="low-stock-item">
              <span>${escapeHtml(i.itemName)}</span>
              <span class="tag danger">${i.quantity} ${escapeHtml(i.unit||'')} left</span>
            </div>`).join("")}
      </div>
    </div>

    <div class="card">
      <div class="card-title">Recent Activity</div>
      <div class="table-wrap">
        <table>
          <thead><tr><th>Date</th><th>Service</th><th>Customer</th><th>Amount</th></tr></thead>
          <tbody>
            ${recent.length===0 ? `<tr><td colspan="4"><div class="empty-state">No transactions recorded yet. Start by adding one from the sidebar.</div></td></tr>` :
              recent.map(r=>`
                <tr>
                  <td class="mono">${fmtDate(r.date)}</td>
                  <td><span class="tag neutral">${r._module}</span></td>
                  <td>${escapeHtml(r.customerName||'—')}</td>
                  <td class="mono">${fmtMoney(r.amount)}</td>
                </tr>`).join("")}
          </tbody>
        </table>
      </div>
    </div>
  `;

  const ctx = document.getElementById('revChart');
  if(ctx && window.Chart){
    new Chart(ctx, {
      type:'bar',
      data:{
        labels:Object.keys(categoryTotals),
        datasets:[{ label:'Revenue', data:Object.values(categoryTotals), backgroundColor:'#d98e2b', borderRadius:6 }]
      },
      options:{
        plugins:{legend:{display:false}},
        scales:{ y:{beginAtZero:true, grid:{color:'#eee'}}, x:{grid:{display:false}} }
      }
    });
  }
}

/* ---------------- GENERIC MODULE CRUD PAGES ---------------- */
let moduleState = {}; // per-store: {search, from, to, editingId}

async function renderModulePage(storeKey){
  const cfg = MODULES[storeKey];
  await refreshCache(storeKey);
  moduleState[storeKey] = moduleState[storeKey] || {search:"", from:"", to:""};
  const st = moduleState[storeKey];
  const content = document.getElementById('content');

  content.innerHTML = `
    <div class="section-title">${cfg.title}</div>
    <div class="section-desc">${cfg.desc}</div>
    <div class="card">
      <div class="toolbar">
        <input class="search-box" id="modSearch" placeholder="Search ${cfg.title.toLowerCase()}…" value="${escapeHtml(st.search)}">
        <input type="date" id="modFrom" value="${st.from}" title="From date">
        <input type="date" id="modTo" value="${st.to}" title="To date">
        <button class="btn btn-outline btn-sm" onclick="clearModuleFilters('${storeKey}')">Clear</button>
        <div class="spacer"></div>
        <button class="btn btn-outline btn-sm" onclick="exportModuleCSV('${storeKey}')">⬇ Export CSV</button>
        <button class="btn btn-primary" onclick="openModuleForm('${storeKey}')">+ Add ${cfg.singular}</button>
      </div>
      <div class="table-wrap" id="modTableWrap"></div>
    </div>
  `;
  document.getElementById('modSearch').oninput = (e)=>{ st.search = e.target.value; renderModuleTable(storeKey); };
  document.getElementById('modFrom').onchange = (e)=>{ st.from = e.target.value; renderModuleTable(storeKey); };
  document.getElementById('modTo').onchange = (e)=>{ st.to = e.target.value; renderModuleTable(storeKey); };
  renderModuleTable(storeKey);
}
function clearModuleFilters(storeKey){
  moduleState[storeKey] = {search:"", from:"", to:""};
  renderModulePage(storeKey);
}
function getFilteredRecords(storeKey){
  const cfg = MODULES[storeKey];
  const st = moduleState[storeKey] || {};
  let recs = [...(cache[storeKey]||[])];
  if(st.search){
    const q = st.search.toLowerCase();
    recs = recs.filter(r => cfg.fields.some(f => String(r[f.key]||"").toLowerCase().includes(q)));
  }
  if(st.from) recs = recs.filter(r => (r.date||"") >= st.from);
  if(st.to) recs = recs.filter(r => (r.date||"") <= st.to);
  recs.sort((a,b)=> (b.date||"").localeCompare(a.date||"") || (b.id-a.id));
  return recs;
}
function renderModuleTable(storeKey){
  const cfg = MODULES[storeKey];
  const wrap = document.getElementById('modTableWrap');
  const recs = getFilteredRecords(storeKey);
  const fieldMap = {}; cfg.fields.forEach(f=> fieldMap[f.key]=f);

  if(recs.length===0){
    wrap.innerHTML = `<div class="empty-state"><div class="em-ic">📭</div>No ${cfg.title.toLowerCase()} found. Click "Add ${cfg.singular}" to create one.</div>`;
    return;
  }
  let total = 0;
  const rows = recs.map(r=>{
    total += Number(r.amount||0);
    const cells = cfg.columns.map(colKey=>{
      const f = fieldMap[colKey];
      let val = r[colKey];
      if(colKey === cfg.dateField) return `<td class="mono">${fmtDate(val)}</td>`;
      if(colKey === "amount" || colKey==="commission" || colKey==="ratePerPage" || colKey==="ratePerCopy") return `<td class="mono">${fmtMoney(val)}</td>`;
      if(f && f.type==="select" && colKey==="status") return `<td><span class="tag ${statusTagClass(val)}">${escapeHtml(val||'—')}</span></td>`;
      return `<td>${escapeHtml(val ?? '—')}</td>`;
    }).join("");
    return `<tr>
      ${cells}
      <td>
        <div class="row-actions">
          <button class="icon-btn" title="Edit" onclick="openModuleForm('${storeKey}', ${r.id})">✏️</button>
          <button class="icon-btn" title="Delete" onclick="deleteModuleRecord('${storeKey}', ${r.id})">🗑️</button>
        </div>
      </td>
    </tr>`;
  }).join("");

  const headLabels = cfg.columns.map(c => fieldMap[c] ? fieldMap[c].label : c);
  wrap.innerHTML = `
    <table>
      <thead><tr>${headLabels.map(l=>`<th>${l}</th>`).join("")}<th>Actions</th></tr></thead>
      <tbody>${rows}</tbody>
      <tfoot><tr class="total-row"><td colspan="${cfg.columns.length-1}">Total (${recs.length} records)</td><td class="mono">${fmtMoney(total)}</td><td></td></tr></tfoot>
    </table>
  `;
}

async function deleteModuleRecord(storeKey, id){
  if(!confirm("Delete this record? This cannot be undone.")) return;
  await dbDelete(storeKey, id);
  await refreshCache(storeKey);
  renderModuleTable(storeKey);
  showToast("Record deleted", "danger");
}

function openModuleForm(storeKey, id){
  const cfg = MODULES[storeKey];
  const editing = id != null;
  const record = editing ? cache[storeKey].find(r=>r.id===id) : {};
  document.getElementById('modalTitle').textContent = (editing? "Edit " : "Add ") + cfg.singular;
  const body = document.getElementById('modalBody');
  body.innerHTML = `<div class="form-grid">
    ${cfg.fields.map(f=>{
      const val = editing ? (record[f.key] ?? "") : (f.default ? f.default() : "");
      const full = f.type==="textarea" ? "full" : "";
      if(f.type==="select"){
        return `<div class="field ${full}"><label>${f.label}${f.required?' *':''}</label>
          <select data-key="${f.key}">${f.options.map(o=>`<option value="${o}" ${o===val?'selected':''}>${o}</option>`).join("")}</select></div>`;
      }
      if(f.type==="textarea"){
        return `<div class="field ${full}"><label>${f.label}</label><textarea data-key="${f.key}" rows="2">${escapeHtml(val)}</textarea></div>`;
      }
      return `<div class="field"><label>${f.label}${f.required?' *':''}</label>
        <input type="${f.type}" data-key="${f.key}" value="${escapeHtml(val)}" ${f.type==='number'?'step="0.01"':''}></div>`;
    }).join("")}
  </div>`;

  document.getElementById('modalSaveBtn').onclick = async ()=>{
    const inputs = body.querySelectorAll('[data-key]');
    const obj = editing ? {...record} : {};
    inputs.forEach(inp => {
      const f = cfg.fields.find(f=>f.key===inp.dataset.key);
      obj[inp.dataset.key] = f.type==="number" ? Number(inp.value||0) : inp.value;
    });
    // handle computed fields (e.g. printing/photocopy amount)
    cfg.fields.forEach(f=>{ if(f.computed) obj[f.key] = Number(f.computed(obj)); });
    // validate required
    const missing = cfg.fields.filter(f=>f.required && (obj[f.key]===undefined || obj[f.key]===""));
    if(missing.length){ showToast("Please fill: " + missing.map(f=>f.label).join(", "), "danger"); return; }

    if(editing){ await dbPut(storeKey, obj); showToast(cfg.singular + " updated", "success"); }
    else{ await dbAdd(storeKey, obj); showToast(cfg.singular + " added", "success"); }
    await refreshCache(storeKey);
    closeModal();
    if(currentPage===storeKey) renderModuleTable(storeKey);
  };
  document.getElementById('modalOverlay').classList.add('open');
}
function closeModal(){ document.getElementById('modalOverlay').classList.remove('open'); }

function exportModuleCSV(storeKey){
  const cfg = MODULES[storeKey];
  const recs = getFilteredRecords(storeKey);
  if(recs.length===0){ showToast("Nothing to export", "danger"); return; }
  const headers = cfg.fields.map(f=>f.label);
  const keys = cfg.fields.map(f=>f.key);
  let csv = headers.join(",") + "\n";
  recs.forEach(r=>{
    csv += keys.map(k=> `"${String(r[k]??'').replace(/"/g,'""')}"`).join(",") + "\n";
  });
  downloadFile(`${storeKey}_${today()}.csv`, csv, "text/csv");
}
function downloadFile(filename, content, mime){
  const blob = new Blob([content], {type:mime});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename; a.click();
  URL.revokeObjectURL(url);
}

      <div class="field"><label>Quantity *</label><input type="number" data-key="quantity" value="${record.quantity??0}"></div>

      <div class="field"><label>Purchase Price</label><input type="number" step="0.01" data-key="purchasePrice" value="${record.purchasePrice??0}"></div>
      <div class="field"><label>Selling Price</label><input type="number" step="0.01" data-key="sellingPrice" value="${record.sellingPrice??0}"></div>
    </div>`;
  document.getElementById('modalSaveBtn').onclick = async ()=>{
    const inputs = document.getElementById('modalBody').querySelectorAll('[data-key]');
    const obj = editing? {...record} : {};
    inputs.forEach(inp=> obj[inp.dataset.key] = inp.type==='number' ? Number(inp.value||0) : inp.value);
    if(!obj.itemName){ showToast("Item name is required", "danger"); return; }
    if(editing) await dbPut('inventory', obj); else await dbAdd('inventory', obj);
    await refreshCache('inventory'); closeModal(); renderInventoryTable();
    showToast(editing? "Item updated" : "Item added", "success");
  };
  document.getElementById('modalOverlay').classList.add('open');
}

/* ---------------- EMPLOYEES ---------------- */
async function renderEmployees(){
  await refreshCache('employees');
  const content = document.getElementById('content');
  content.innerHTML = `
    <div class="section-title">Employees</div>
    <div class="section-desc">Manage staff working at your shop.</div>
    <div class="card">
      <div class="toolbar"><div class="spacer"></div>
        <button class="btn btn-primary" onclick="openEmployeeForm()">+ Add Employee</button>
      </div>
      <div class="table-wrap" id="empTableWrap"></div>
    </div>`;
  renderEmployeeTable();
}
function renderEmployeeTable(){
  const wrap = document.getElementById('empTableWrap');
  const recs = [...(cache.employees||[])].sort((a,b)=>(a.name||"").localeCompare(b.name||""));
  if(recs.length===0){
    wrap.innerHTML = `<div class="empty-state"><div class="em-ic">🧑‍💼</div>No employees added yet.</div>`;
    return;
  }
  wrap.innerHTML = `<table>
    <thead><tr><th>Name</th><th>Role</th><th>Phone</th><th>Salary</th><th>Joining Date</th><th>Status</th><th>Actions</th></tr></thead>
    <tbody>${recs.map(e=>`
      <tr>
        <td><strong>${escapeHtml(e.name)}</strong></td>
        <td>${escapeHtml(e.role||'—')}</td>
        <td class="mono">${escapeHtml(e.phone||'—')}</td>
        <td class="mono">${fmtMoney(e.salary)}</td>
        <td class="mono">${fmtDate(e.joiningDate)}</td>
        <td><span class="tag ${e.active===false?'danger':'success'}">${e.active===false?'Inactive':'Active'}</span></td>
        <td><div class="row-actions">
          <button class="icon-btn" onclick="openEmployeeForm(${e.id})">✏️</button>
          <button class="icon-btn" onclick="deleteEmployee(${e.id})">🗑️</button>
        </div></td>
      </tr>`).join("")}</tbody>
  </table>`;
}
async function deleteEmployee(id){
  if(!confirm("Remove this employee?")) return;
  await dbDelete('employees', id); await refreshCache('employees'); renderEmployeeTable();
  showToast("Employee removed", "danger");
}
function openEmployeeForm(id){
  const editing = id != null;
  const record = editing ? cache.employees.find(e=>e.id===id) : {active:true};
  document.getElementById('modalTitle').textContent = editing? "Edit Employee" : "Add Employee";
  document.getElementById('modalBody').innerHTML = `
    <div class="form-grid">
      <div class="field"><label>Full Name *</label><input data-key="name" value="${escapeHtml(record.name||'')}"></div>
      <div class="field"><label>Role</label><input data-key="role" value="${escapeHtml(record.role||'')}" placeholder="e.g. Operator, Cashier"></div>
      <div class="field"><label>Phone</label><input data-key="phone" value="${escapeHtml(record.phone||'')}"></div>
      <div class="field"><label>Monthly Salary</label><input type="number" data-key="salary" value="${record.salary??0}"></div>
      <div class="field"><label>Joining Date</label><input type="date" data-key="joiningDate" value="${record.joiningDate||''}"></div>
      <div class="field"><label>Status</label>
        <select data-key="active">
          <option value="true" ${record.active!==false?'selected':''}>Active</option>
          <option value="false" ${record.active===false?'selected':''}>Inactive</option>
        </select></div>
    </div>`;
  document.getElementById('modalSaveBtn').onclick = async ()=>{
    const inputs = document.getElementById('modalBody').querySelectorAll('[data-key]');
    const obj = editing? {...record} : {};
    inputs.forEach(inp=>{
      if(inp.dataset.key==='active') obj.active = inp.value==='true';
      else if(inp.dataset.key==='salary') obj.salary = Number(inp.value||0);
      else obj[inp.dataset.key] = inp.value;
    });
    if(!obj.name){ showToast("Name is required", "danger"); return; }
    if(editing) await dbPut('employees', obj); else await dbAdd('employees', obj);
    await refreshCache('employees'); closeModal(); renderEmployeeTable();
    showToast(editing? "Employee updated" : "Employee added", "success");
  };
  document.getElementById('modalOverlay').classList.add('open');
}

/* ---------------- REPORTS ---------------- */
async function renderReports(){
  const revenueStores = ["transactions","aeps","irctc","pan","certificates","printing","photocopy"];
  for(const s of revenueStores) await ensureCache(s);
  await ensureCache('expenses');
  const content = document.getElementById('content');
  const from = today().slice(0,8)+"01";
  const to = today();
  content.innerHTML = `
    <div class="section-title">Reports</div>
    <div class="section-desc">Revenue, expense & category breakdown for any date range.</div>
    <div class="card">
      <div class="toolbar">
        <label style="font-size:12px; color:var(--text-muted);">From</label>
        <input type="date" id="repFrom" value="${from}">
        <label style="font-size:12px; color:var(--text-muted);">To</label>
        <input type="date" id="repTo" value="${to}">
        <button class="btn btn-primary btn-sm" onclick="runReport()">Generate</button>
        <div class="spacer"></div>
        <button class="btn btn-outline btn-sm" onclick="exportReportCSV()">⬇ Export CSV</button>
      </div>
      <div id="reportOutput"></div>
    </div>`;
  runReport();
}
let lastReportRows = [];
function runReport(){
  const from = document.getElementById('repFrom').value;
  const to = document.getElementById('repTo').value;
  const revenueStores = ["transactions","aeps","irctc","pan","certificates","printing","photocopy"];
  let rows = [];
  let categoryTotals = {};
  let grandTotal = 0;
  revenueStores.forEach(s=>{
    (cache[s]||[]).forEach(r=>{
      if((!from || r.date>=from) && (!to || r.date<=to)){
        categoryTotals[MODULES[s].title] = (categoryTotals[MODULES[s].title]||0) + Number(r.amount||0);
        grandTotal += Number(r.amount||0);
        rows.push({date:r.date, category:MODULES[s].title, customer:r.customerName||'', amount:r.amount||0});
      }
    });
  });
  let expenseTotal = 0;
  let expenseCategory = {};
  (cache.expenses||[]).forEach(e=>{
    if((!from || e.date>=from) && (!to || e.date<=to)){
      expenseTotal += Number(e.amount||0);
      expenseCategory[e.category] = (expenseCategory[e.category]||0) + Number(e.amount||0);
      rows.push({date:e.date, category:"Expense: "+e.category, customer:e.description||'', amount:-Number(e.amount||0)});
    }
  });
  lastReportRows = rows.sort((a,b)=> (a.date||"").localeCompare(b.date||""));

  const out = document.getElementById('reportOutput');
  out.innerHTML = `
    <div class="stat-grid" style="margin-top:16px;">
      <div class="stat-card success"><div class="label">Total Revenue</div><div class="value">${fmtMoney(grandTotal)}</div></div>
      <div class="stat-card danger"><div class="label">Total Expenses</div><div class="value">${fmtMoney(expenseTotal)}</div></div>
      <div class="stat-card accent"><div class="label">Net Profit</div><div class="value">${fmtMoney(grandTotal-expenseTotal)}</div></div>
    </div>
    <div class="two-col">
      <div class="card">
        <div class="card-title">Revenue by Category</div>
        <div class="kv-list">${Object.entries(categoryTotals).length? Object.entries(categoryTotals).map(([k,v])=>`<div><span>${k}</span><span class="mono">${fmtMoney(v)}</span></div>`).join("") : '<div class="empty-state" style="padding:16px;">No revenue in this range.</div>'}</div>
      </div>
      <div class="card">
        <div class="card-title">Expenses by Category</div>
        <div class="kv-list">${Object.entries(expenseCategory).length? Object.entries(expenseCategory).map(([k,v])=>`<div><span>${k}</span><span class="mono">${fmtMoney(v)}</span></div>`).join("") : '<div class="empty-state" style="padding:16px;">No expenses in this range.</div>'}</div>
      </div>
    </div>
  `;
}
function exportReportCSV(){
  if(lastReportRows.length===0){ showToast("No data to export", "danger"); return; }
  let csv = "Date,Category,Customer/Note,Amount\n";
  lastReportRows.forEach(r=> csv += `"${r.date}","${r.category}","${(r.customer||'').replace(/"/g,'""')}","${r.amount}"\n`);
  downloadFile(`report_${today()}.csv`, csv, "text/csv");
}

/* ---------------- SETTINGS ---------------- */

  const s = await dbGet('settings', 1) || SETTINGS;
  const content = document.getElementById('content');
  content.innerHTML = `
    <div class="section-title">Settings</div>
    <div class="section-desc">Customize your shop details and app preferences.</div>
    <div class="card" style="max-width:600px;">
      <div class="card-title">Shop Information</div>
      <div class="form-grid">
        <div class="field full"><label>Shop Name</label><input id="setShopName" value="${escapeHtml(s.shopName||'')}"></div>
        <div class="field"><label>Owner Name</label><input id="setOwnerName" value="${escapeHtml(s.ownerName||'')}"></div>
        <div class="field"><label>Phone</label><input id="setPhone" value="${escapeHtml(s.phone||'')}"></div>
        <div class="field full"><label>Address</label><input id="setAddress" value="${escapeHtml(s.address||'')}"></div>
        <div class="field"><label>Email</label><input id="setEmail" value="${escapeHtml(s.email||'')}"></div>
        <div class="field"><label>GST No. (optional)</label><input id="setGst" value="${escapeHtml(s.gstNo||'')}"></div>
        <div class="field"><label>Currency Symbol</label><input id="setCurrency" value="${escapeHtml(s.currency||'₹')}"></div>
        <div class="field"><label>Default Low Stock Alert</label><input type="number" id="setLowStock" value="${s.lowStockDefault??5}"></div>
      </div>
      <div style="margin-top:16px;"><button class="btn btn-primary" onclick="saveSettings()">Save Settings</button></div>
    </div>
    <div class="card" style="max-width:600px;">
      <div class="card-title">App Lock (PIN)</div>
      <div class="section-desc" style="margin-bottom:12px;">Set a PIN to lock the app when you step away. Leave blank to disable locking.</div>
      <div class="form-grid single">
        <div class="field"><label>PIN (4-8 digits)</label><input type="password" id="setPin" maxlength="8" value="${escapeHtml(s.pin||'')}"></div>

    </div>
  `;
}
async function saveSettings(){
  const s = {
    id:1,
    shopName: document.getElementById('setShopName').value || "AK Digital Services",
    ownerName: document.getElementById('setOwnerName').value,
    phone: document.getElementById('setPhone').value,
    address: document.getElementById('setAddress').value,

    gstNo: document.getElementById('setGst').value,
    currency: document.getElementById('setCurrency').value || "₹",
    lowStockDefault: Number(document.getElementById('setLowStock').value||5),
    pin: SETTINGS.pin,
  };

async function savePin(){
  const pin = document.getElementById('setPin').value.trim();
  SETTINGS.pin = pin;
  await dbPut('settings', SETTINGS);
  showToast(pin? "PIN lock enabled" : "PIN lock disabled", "success");
}

/* ---------------- BACKUP ---------------- */
async function renderBackup(){
  const content = document.getElementById('content');
  content.innerHTML = `
    <div class="section-title">Backup & Restore</div>
    <div class="section-desc">Export all your shop data to a file for safekeeping, or restore from a previous backup.</div>
    <div class="card" style="max-width:600px;">
      <div class="card-title">Export Backup</div>
      <p class="hint" style="margin-bottom:14px;">Downloads a single JSON file containing all your records — customers, transactions, inventory, everything.</p>
      <button class="btn btn-primary" onclick="exportBackup()">⬇ Download Backup File</button>
    </div>
    <div class="card" style="max-width:600px;">
      <div class="card-title">Restore from Backup</div>
      <p class="hint" style="margin-bottom:14px;">This will replace all current data with the contents of the backup file. This cannot be undone.</p>
      <input type="file" id="restoreFile" accept=".json">
      <div style="margin-top:12px;"><button class="btn btn-outline" onclick="restoreBackup()">Restore Backup</button></div>
    </div>
    <div class="card" style="max-width:600px; border-color:var(--danger);">
      <div class="card-title" style="color:var(--danger);">Danger Zone</div>
      <p class="hint" style="margin-bottom:14px;">Permanently delete all records from every module. Your settings will be kept.</p>
      <button class="btn btn-danger" onclick="clearAllData()">Clear All Data</button>
    </div>
  `;
}
async function exportBackup(){
  const dump = {};
  for(const store of STORES){ dump[store] = await dbGetAll(store); }
  dump._meta = {exportedAt: new Date().toISOString(), app:"AK Digital Services", version:1};
  downloadFile(`AK_Digital_Services_Backup_${today()}.json`, JSON.stringify(dump, null, 2), "application/json");
  showToast("Backup downloaded", "success");
}
async function restoreBackup(){
  const fileInput = document.getElementById('restoreFile');
  if(!fileInput.files.length){ showToast("Choose a backup file first", "danger"); return; }
  if(!confirm("This will replace ALL current data. Continue?")) return;
  const file = fileInput.files[0];
  const text = await file.text();
  let data;
  try{ data = JSON.parse(text); } catch(e){ showToast("Invalid backup file", "danger"); return; }
  for(const store of STORES){
    if(!data[store]) continue;
    await dbClear(store);
    for(const rec of data[store]){ await dbPut(store, rec); }
  }
  await loadSettings();
  cache = {};
  showToast("Backup restored successfully", "success");
  goTo('dashboard');
}
async function clearAllData(){
  if(!confirm("This will permanently delete ALL records (customers, transactions, inventory, everything except settings). Continue?")) return;
  if(!confirm("Are you absolutely sure? This cannot be undone.")) return;
  for(const store of STORES){ if(store!=='settings') await dbClear(store); }
  cache = {};
  showToast("All data cleared", "danger");
  goTo('dashboard');
}

/* ---------------- LOCK / LOGOUT ---------------- */
async function logout(){
  if(!SETTINGS.pin){ showToast("Set a PIN in Settings to enable locking", "danger"); return; }
  document.getElementById('lockScreen').style.display = 'flex';
  document.getElementById('appRoot').style.visibility = 'hidden';
  document.getElementById('lockPinInput').value = '';
  document.getElementById('lockError').textContent = '';
  setTimeout(()=> document.getElementById('lockPinInput').focus(), 100);
}
function tryUnlock(){
  const val = document.getElementById('lockPinInput').value;
  if(val === SETTINGS.pin){
    document.getElementById('lockScreen').style.display = 'none';
    document.getElementById('appRoot').style.visibility = 'visible';
  } else {
    document.getElementById('lockError').textContent = 'Incorrect PIN. Try again.';
  }
}
document.addEventListener('keydown', (e)=>{
  if(e.key==='Enter' && document.getElementById('lockScreen').style.display==='flex') tryUnlock();
});

/* ---------------- INIT ---------------- */
async function loadSettings(){
  const s = await dbGet('settings', 1);
  if(s) SETTINGS = {...SETTINGS, ...s};
  else await dbPut('settings', SETTINGS);
}
function updateTopDate(){
  document.getElementById('topDate').textContent = new Date().toLocaleString('en-IN', {dateStyle:'medium', timeStyle:'short'});
}
async function init(){
  await openDB();
  await loadSettings();
  renderNav();
  updateTopDate();
  setInterval(updateTopDate, 30000);
  goTo('dashboard');
}
init();
</script>
